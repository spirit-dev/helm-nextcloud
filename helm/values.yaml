    livenessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 5
    ## @param metrics.readinessProbe.enabled Enable readinessProbe on Redis&reg; replicas nodes
